<!DOCTYPE html>
<html>
<head>
<title>Choose</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}

.card{
    width:300px;
    margin:120px auto;
    padding:20px;
    background:#1c1c1c;
    border-radius:15px;
    box-shadow:0 0 20px cyan;
}

button{
    width:100%;
    padding:12px;
    margin:10px 0;
    background:cyan;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h2>Choose Analysis</h2>

    <button onclick="symptoms()">🧾 Symptoms</button>
    <button onclick="image()">📸 Image</button>
</div>

<script>
function symptoms(){
    window.location.href = "symptoms.html";
}

function image(){
    window.location.href = "image.html";
}
</script>

</body>
</html>
